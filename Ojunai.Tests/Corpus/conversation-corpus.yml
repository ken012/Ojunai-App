      contains: { sellAllProduct: "rice" }
    notes: "Bare 'yes' confirms the proposed action"

  - id: pending-topic-switch-001
    message: "What did I sell today?"
    pending:
      intent: create_sale
      awaitingField: unitPrice
      questionText: "No selling price is set for shampoo. Please say the price."
      partialPayload: '{"sellHalfProduct":"shampoo"}'
    expect:
