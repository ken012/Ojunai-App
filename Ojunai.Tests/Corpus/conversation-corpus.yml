  - id: pending-yes-001
    message: "yes"
    pending:
      intent: create_sale
      awaitingField: confirmation
      questionText: "Sell all 50 bags of rice at 5000 each — total ₦250,000?"
      partialPayload: '{"sellAllProduct":"rice"}'
    expect:
